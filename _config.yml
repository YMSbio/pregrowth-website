# 網站基本設定
title: "許鈺敏 醫師 | 兒童內分泌與精準醫療"
description: "「在追求公分數之前，先用數據與基因，為孩子確認健康的效益。」"
url: "https://ymsbio.github.io"
baseurl: "/pregrowth-website"

# 載入 Minimal Mistakes 主題與必要外掛 (這行加了 plugins 就不會當機了)
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "air"
plugins:
  - jekyll-include-cache

# 左側個人檔案設定
author:
  name: "許鈺敏 醫師"
  avatar: "/Gemini_Generated_Image_ppecwzppecwzppec.png"
  bio: "小兒內分泌專科 ｜ 資料科學與大數據"
  location: "臺北醫學大學附設醫院"
  links:
    - label: "商務表單"
      icon: "fas fa-fw fa-envelope"
      url: "https://forms.gle/A51KtVUcTwMXAvTy8"

# 啟用導覽列
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
